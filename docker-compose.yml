services:
  dashboard:
    build: .
    container_name: aia-dashboard
    # No published ports: the dashboard is reachable ONLY over the internal
    # compose network (oauth2-proxy --upstream=http://dashboard:8080). The only
    # way in from the internet is Traefik -> Microsoft login -> oauth2-proxy.
    expose:
      - "8080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      # use python (curl isn't in the image); allow time for the initial DB load
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080',timeout=5).status==200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ── Microsoft (Entra ID) login gate ──────────────────────────────────────
  # Traefik terminates TLS for ops.aiaccountant.com and routes here. This
  # authenticates the user against Microsoft 365, allows only @karboncard.com,
  # then reverse-proxies the request to the dashboard. No app code changes.
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: aia-oauth2-proxy
    depends_on:
      - dashboard
    env_file:
      - .env                         # OAUTH2_PROXY_* values live here (see .env.example)
    command:
      - --upstream=http://dashboard:8080   # the app, reached over the compose network
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true               # trust X-Forwarded-* from Traefik
      - --proxy-websockets=true            # Taipy needs WebSocket pass-through
      - --skip-provider-button=true        # go straight to Microsoft, no extra click
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ops.rule=Host(`ops.aiaccountant.com`)"
      - "traefik.http.routers.ops.entrypoints=websecure"
      - "traefik.http.routers.ops.tls.certresolver=letsencrypt"
      - "traefik.http.services.ops.loadbalancer.server.port=4180"
      - "traefik.docker.network=taipy-dashboard_default"

# Pin the network name so the traefik.docker.network label above always matches.
networks:
  default:
    name: taipy-dashboard_default
    # Lower MTU: the host path to Neon can't carry full 1500-byte packets, and
    # Docker's NAT doesn't relay the PMTUD "fragmentation needed" signal into the
    # container, so large DB transfers black-hole -> "SSL connection closed
    # unexpectedly". Capping the container MTU avoids oversized packets entirely.
    driver_opts:
      com.docker.network.driver.mtu: "1400"
